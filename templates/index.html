<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Studio | Minimalist Quiz Platform</title>
    
    <!-- Nhúng Montserrat từ Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: #fafafa;
            --text: #1a1a1a;
            --border: #e0e0e0;
            --accent: #000000;
            --correct: #27ae60;
            --wrong: #c0392b;
            --hover: #f5f5f5;
        }

        /* Áp dụng font Montserrat cho TOÀN BỘ website */
        * {
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Sidebar Styling */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: all 0.3s; }
        .sidebar-header { padding: 30px 20px; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; border-bottom: 1px solid var(--border); }
        .question-nav { padding: 20px; overflow-y: auto; flex-grow: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .nav-item { width: 100%; aspect-ratio: 1; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; border-radius: 4px; transition: 0.2s; background: white; }
        .nav-item:hover { background: var(--hover); }
        .nav-item.active { background: var(--accent); color: white; border-color: var(--accent); }
        .nav-item.answered { border-color: var(--accent); border-width: 2px; }

        /* Main Content */
        .main-container { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; background: var(--bg); position: relative; }
        .top-bar { padding: 15px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 10; height: 60px; }
        .quiz-content { max-width: 700px; margin: 40px auto; padding: 0 20px; width: 100%; }

        /* Typography & Forms */
        h2 { font-weight: 700; font-size: 2.2rem; margin-bottom: 10px; letter-spacing: -1.5px; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        
        textarea { width: 100%; height: 350px; border: 1px solid var(--border); padding: 20px; font-size: 1rem; line-height: 1.6; resize: none; margin-bottom: 20px; transition: border-color 0.3s; }
        textarea:focus { outline: none; border-color: var(--accent); }
        
        .btn { background: var(--accent); color: white; border: none; padding: 12px 25px; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1.5px; transition: 0.3s; }
        .btn:hover { opacity: 0.8; }

        /* Quiz UI Mode Selector */
        .mode-selector { display: flex; gap: 25px; margin-bottom: 15px; border-bottom: 1px solid var(--border); }
        .mode-option { cursor: pointer; opacity: 0.3; font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; padding-bottom: 10px; transition: 0.3s; }
        .mode-option.active { opacity: 1; border-bottom: 2px solid var(--accent); }
        
        .mode-info { font-size: 0.85rem; color: #666; margin-bottom: 30px; min-height: 1.2em; font-style: italic; }

        /* Questions */
        .question-card { margin-bottom: 60px; scroll-margin-top: 100px; }
        .q-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 25px; line-height: 1.5; color: #111; }
        .option { padding: 15px 20px; border: 1px solid var(--border); margin-bottom: 12px; cursor: pointer; transition: all 0.2s; border-radius: 4px; font-weight: 500; }
        .option:hover { border-color: var(--accent); background: #fafafa; }
        .option.selected { background: #f0f0f0; border-color: var(--accent); font-weight: 600; }
        
        .option.correct { color: white; background: var(--correct) !important; border-color: var(--correct) !important; }
        .option.wrong { color: white; background: var(--wrong) !important; border-color: var(--wrong) !important; }

        #scoreOverlay { display: none; text-align: center; padding: 60px 20px; background: white; border: 1px solid var(--border); margin-top: 40px; }
        .score-val { font-size: 5rem; font-weight: 800; display: block; margin: 10px 0; color: var(--accent); letter-spacing: -2px; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar" style="display:none;">
    <div class="sidebar-header">Q-DASHBOARD</div>
    <div class="question-nav" id="questionNav"></div>
    <div style="padding: 20px; border-top: 1px solid var(--border);">
        <button class="btn" style="width: 100%;" id="submitAllBtn" onclick="submitQuiz()">Nộp bài</button>
    </div>
</div>

<div class="main-container">
    <div class="top-bar" id="topBar" style="display:none;">
        <div id="quizTimer" style="font-weight: 800; font-size: 1.1rem;">00:00</div>
        <div id="quizModeIndicator" style="font-weight:700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; color: #888;"></div>
    </div>

    <div class="quiz-content" id="inputSection">
        <h2>Create Quiz.</h2>
        <p class="subtitle">Personal minimalist tool by Nam.</p>
        
        <div class="mode-selector">
            <div class="mode-option active" id="btn-practice" onclick="setMode('practice', this)">PRACTICE</div>
            <div class="mode-option" id="btn-test" onclick="setMode('test', this)">TEST</div>
        </div>
        <div class="mode-info" id="modeInfo">Biết ngay kết quả Đúng/Sai sau khi chọn mỗi câu.</div>

        <textarea id="rawText" placeholder="Dán nội dung câu hỏi tại đây..."></textarea>
        <button class="btn" onclick="generateQuiz()">Bắt đầu ngay</button>
    </div>

    <div class="quiz-content" id="quizArea" style="display:none;">
        <div id="questionsContainer"></div>
        <div id="scoreOverlay">
            <h3 style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem;">Kết quả cuối cùng</h3>
            <span class="score-val" id="finalScore">0/10</span>
            <p id="scoreDetail" style="margin-bottom: 30px; color: #666;"></p>
            <button class="btn" onclick="location.reload()">Làm đề mới</button>
        </div>
    </div>
</div>

<script>
    let questions = [];
    let currentMode = 'practice';
    let userAnswers = {};
    let startTime;
    let timerInterval;

    const modeTexts = {
        'practice': 'Chế độ Luyện tập: Hệ thống hiện đáp án Đúng/Sai ngay sau khi bạn chọn.',
        'test': 'Chế độ Kiểm tra: Làm hết toàn bộ bài, kết quả và điểm số chỉ hiện sau khi bạn nhấn Nộp bài.'
    };

    function setMode(mode, el) {
        currentMode = mode;
        document.querySelectorAll('.mode-option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('modeInfo').innerText = modeTexts[mode];
    }

    async function generateQuiz() {
        const text = document.getElementById('rawText').value;
        if(!text.trim()) return;

        const res = await fetch('/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text})
        });
        questions = await res.json();

        document.getElementById('inputSection').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('topBar').style.display = 'flex';
        document.getElementById('quizArea').style.display = 'block';
        document.getElementById('quizModeIndicator').innerText = `Chế độ: ${currentMode}`;
        
        if(currentMode === 'practice') document.getElementById('submitAllBtn').style.display = 'none';

        renderQuiz();
        renderSidebar();
        startTimer();
    }

    function renderSidebar() {
        const nav = document.getElementById('questionNav');
        nav.innerHTML = '';
        questions.forEach((_, i) => {
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.id = `nav-${i}`;
            item.innerText = i + 1;
            item.onclick = () => {
                document.getElementById(`q-${i}`).scrollIntoView({behavior: 'smooth'});
                updateActiveNav(i);
            };
            nav.appendChild(item);
        });
    }

    function updateActiveNav(idx) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`nav-${idx}`).classList.add('active');
    }

    function renderQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        questions.forEach((q, i) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-card';
            qDiv.id = `q-${i}`;
            qDiv.innerHTML = `<div class="q-text">${i + 1}. ${q.question}</div>`;
            
            q.options.forEach(opt => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerText = `${opt.label}. ${opt.text}`;
                optDiv.onclick = () => handleSelect(i, opt.label, optDiv, qDiv);
                qDiv.appendChild(optDiv);
            });
            container.appendChild(qDiv);
        });
    }

    function handleSelect(qIdx, label, optDiv, qCard) {
        if (currentMode === 'practice' && qCard.classList.contains('answered')) return;
        if (currentMode === 'test' && document.getElementById('scoreOverlay').style.display === 'block') return;

        userAnswers[qIdx] = label;
        document.getElementById(`nav-${qIdx}`).classList.add('answered');

        if (currentMode === 'practice') {
            qCard.classList.add('answered');
            const correctLabel = questions[qIdx].answer;
            if (label === correctLabel) {
                optDiv.classList.add('correct');
            } else {
                optDiv.classList.add('wrong');
                qCard.querySelectorAll('.option').forEach(o => {
                    if(o.innerText.startsWith(correctLabel)) o.classList.add('correct');
                });
            }
        } else {
            qCard.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            optDiv.classList.add('selected');
        }
    }

    function submitQuiz() {
        if(!confirm("Bạn có chắc chắn muốn nộp bài không?")) return;
        
        clearInterval(timerInterval);
        let correctCount = 0;
        
        document.getElementById('questionsContainer').style.display = 'none';
        
        questions.forEach((q, i) => {
            const correctLabel = q.answer;
            const userLabel = userAnswers[i];
            if(userLabel === correctLabel) correctCount++;
        });

        const scoreOn10 = ((correctCount / questions.length) * 10).toFixed(2);
        document.getElementById('scoreOverlay').style.display = 'block';
        document.getElementById('finalScore').innerText = `${scoreOn10}/10`;
        document.getElementById('scoreDetail').innerText = `Kết quả: Đúng ${correctCount} trên tổng số ${questions.length} câu.`;
        window.scrollTo(0,0);
    }

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const m = Math.floor(elapsed / 60000).toString().padStart(2, '0');
            const s = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('quizTimer').innerText = `${m}:${s}`;
        }, 1000);
    }
</script>
</body>
</html>
