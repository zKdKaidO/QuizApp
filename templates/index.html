<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Studio | Personal Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --sidebar-bg: #ffffff; --text: #1a1a1a; --border: #f0f0f0; --accent: #000000; --correct: #27ae60; --wrong: #c0392b; }
        * { font-family: 'Montserrat', sans-serif; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 20; }
        .sidebar-header { padding: 45px 25px 20px 25px; font-weight: 700; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2.5px; color: #aaa; }
        .question-nav { padding: 10px 20px; overflow-y: auto; flex-grow: 1; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; align-content: start; }
        .nav-item { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.75rem; font-weight: 500; border-radius: 50%; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); background: #f9f9f9; color: #bbb; border: 1px solid transparent; }
        .nav-item:hover { background: #000; color: #fff; }
        .nav-item.active { border: 1.5px solid #000; background: #fff; color: #000; }
        .nav-item.answered { background: #1a1a1a; color: #fff; }
        .sidebar-footer { padding: 25px; border-top: 1px solid var(--border); }
        .btn-finalize { width: 100%; background: #000; color: #fff; border: none; padding: 15px; font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }

        /* MAIN CONTAINER */
        .main-container { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }
        .top-bar { padding: 0 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; min-height: 70px; background: white; z-index: 10; position: sticky; top: 0; }
        .quiz-content { max-width: 720px; margin: 50px auto; padding: 0 30px; width: 100%; }
        h2 { font-weight: 800; font-size: 2.4rem; margin: 0 0 10px 0; letter-spacing: -2px; }
        .subtitle { color: #999; font-size: 0.85rem; margin-bottom: 40px; }
        textarea { width: 100%; height: 350px; border: 1px solid var(--border); padding: 25px; font-size: 0.95rem; line-height: 1.7; resize: none; margin-bottom: 20px; }
        .mode-selector { display: flex; gap: 30px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
        .mode-option { cursor: pointer; opacity: 0.25; font-weight: 700; font-size: 0.8rem; letter-spacing: 1.5px; padding-bottom: 12px; }
        .mode-option.active { opacity: 1; border-bottom: 2.5px solid var(--accent); }
        .mode-info { font-size: 0.8rem; color: #777; margin-bottom: 35px; font-style: italic; }

        /* CARDS */
        .question-card { margin-bottom: 70px; scroll-margin-top: 100px; }
        .q-text { font-size: 1.25rem; font-weight: 700; margin-bottom: 30px; line-height: 1.5; }
        .option { padding: 18px 25px; border: 1px solid var(--border); margin-bottom: 14px; cursor: pointer; border-radius: 6px; font-weight: 500; transition: 0.2s; }
        .option:hover { border-color: #000; background: #fafafa; }
        .option.selected { background: #f2f2f2; border-color: #000; font-weight: 600; }
        .option.correct { color: white !important; background: var(--correct) !important; border-color: var(--correct) !important; }
        .option.wrong { color: white !important; background: var(--wrong) !important; border-color: var(--wrong) !important; }
        #scoreOverlay { display: none; text-align: center; padding: 80px 20px; }
        .score-val { font-size: 6rem; font-weight: 800; letter-spacing: -4px; margin: 20px 0; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar" style="display:none;">
    <div class="sidebar-header">Tracking Progress</div>
    <div class="question-nav" id="questionNav"></div>
    <div class="sidebar-footer">
        <button class="btn-finalize" id="submitAllBtn" onclick="submitQuiz()">Nộp bài ngay</button>
    </div>
</div>

<div class="main-container">
    <div class="top-bar" id="topBar" style="display:none;">
        <div id="quizTimer" style="font-weight: 800; font-size: 1.2rem;">00:00</div>
        <div id="quizModeIndicator" style="font-weight:700; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; color: #bbb;"></div>
    </div>

    <div class="quiz-content" id="inputSection">
        <h2>Studio.</h2>
        <p class="subtitle">Designed by PHẠM NHẬT NAM</p>
        <div class="mode-selector">
            <div class="mode-option active" onclick="setMode('practice', this)">PRACTICE</div>
            <div class="mode-option" onclick="setMode('test', this)">TEST</div>
        </div>
        <div class="mode-info" id="modeInfo">Kết quả Đúng/Sai hiển thị ngay lập tức khi chọn.</div>
        <textarea id="rawText" placeholder="Dán nội dung câu hỏi..."></textarea>
        <button class="btn-finalize" onclick="generateQuiz()">Build Quiz</button>
    </div>

    <div class="quiz-content" id="quizArea" style="display:none;">
        <div id="questionsContainer"></div>
        <div id="scoreOverlay">
            <h3 style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; color: #aaa;">Final Grade</h3>
            <span class="score-val" id="finalScore">0/10</span>
            <p id="scoreDetail"></p>
            <button class="btn-finalize" style="width:200px" onclick="location.href='/'">New Session</button>
        </div>
    </div>
</div>

<script>
    let questions = [];
    let currentMode = 'practice';
    let userAnswers = {};
    let startTime;
    let timerInterval;

    function setMode(mode, el) {
        currentMode = mode;
        document.querySelectorAll('.mode-option').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('modeInfo').innerText = mode === 'practice' ? 'Kết quả Đúng/Sai hiển thị ngay khi chọn.' : 'Kết quả chỉ hiển thị sau khi nộp bài.';
    }

    async function generateQuiz() {
        const text = document.getElementById('rawText').value;
        if(!text.trim()) return;
        const res = await fetch('/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text})
        });
        const data = await res.json();
        questions = data.questions;
        document.getElementById('inputSection').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('topBar').style.display = 'flex';
        document.getElementById('quizArea').style.display = 'block';
        if(currentMode === 'practice') document.getElementById('submitAllBtn').style.display = 'none';
        renderQuiz(); renderSidebar(); startTimer();
    }

    function renderSidebar() {
        const nav = document.getElementById('questionNav'); nav.innerHTML = '';
        questions.forEach((_, i) => {
            const item = document.createElement('div');
            item.className = 'nav-item'; item.id = `nav-${i}`; item.innerText = i + 1;
            item.onclick = () => document.getElementById(`q-${i}`).scrollIntoView({behavior: 'smooth'});
            nav.appendChild(item);
        });
    }

    function renderQuiz() {
        const container = document.getElementById('questionsContainer'); container.innerHTML = '';
        questions.forEach((q, i) => {
            const qDiv = document.createElement('div'); qDiv.className = 'question-card'; qDiv.id = `q-${i}`;
            qDiv.innerHTML = `<div class="q-text">${i + 1}. ${q.question}</div>`;
            q.options.forEach(opt => {
                const optDiv = document.createElement('div'); optDiv.className = 'option';
                optDiv.innerText = `${opt.label}. ${opt.text}`;
                optDiv.onclick = () => handleSelect(i, opt.label, optDiv, qDiv);
                qDiv.appendChild(optDiv);
            });
            container.appendChild(qDiv);
        });
    }

    function handleSelect(qIdx, label, optDiv, qCard) {
        if (currentMode === 'practice' && qCard.classList.contains('answered')) return;
        userAnswers[qIdx] = label;
        document.getElementById(`nav-${qIdx}`).classList.add('answered');
        if (currentMode === 'practice') {
            qCard.classList.add('answered');
            const correct = questions[qIdx].answer;
            if (label === correct) optDiv.classList.add('correct');
            else { optDiv.classList.add('wrong'); qCard.querySelectorAll('.option').forEach(o => { if(o.innerText.startsWith(correct)) o.classList.add('correct'); }); }
        } else {
            qCard.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            optDiv.classList.add('selected');
        }
    }

    function submitQuiz() {
        if(!confirm("Xác nhận nộp bài?")) return;
        clearInterval(timerInterval);
        let correctCount = 0;
        questions.forEach((q, i) => { if(userAnswers[i] === q.answer) correctCount++; });
        document.getElementById('questionsContainer').style.display = 'none';
        document.getElementById('scoreOverlay').style.display = 'block';
        document.getElementById('finalScore').innerText = `${((correctCount/questions.length)*10).toFixed(2)}/10`;
        document.getElementById('scoreDetail').innerText = `Đúng ${correctCount}/${questions.length} câu.`;
        window.scrollTo(0,0);
    }

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const m = Math.floor(elapsed / 60000).toString().padStart(2, '0');
            const s = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('quizTimer').innerText = `${m}:${s}`;
        }, 1000);
    }

    const shared = {{ shared_data|safe }};
    if(shared && shared !== null) {
        questions = shared;
        window.onload = () => {
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('topBar').style.display = 'flex';
            document.getElementById('quizArea').style.display = 'block';
            renderQuiz(); renderSidebar(); startTimer();
        };
    }
</script>
</body>
</html>
