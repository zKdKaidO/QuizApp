<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Studio | Minimalist Quiz Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: #fafafa;
            --text: #1a1a1a;
            --border: #e0e0e0;
            --accent: #000000;
            --correct: #27ae60;
            --wrong: #c0392b;
            --hover: #f5f5f5;
        }

        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        textarea, button, input, .nav-item, .option {
            font-family: 'Montserrat', sans-serif;
        }
        /* Sidebar Styling */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: all 0.3s; }
        .sidebar-header { padding: 30px 20px; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; border-bottom: 1px solid var(--border); }
        .question-nav { padding: 20px; overflow-y: auto; flex-grow: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .nav-item { width: 100%; aspect-ratio: 1; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem; border-radius: 4px; transition: 0.2s; }
        .nav-item:hover { background: var(--hover); }
        .nav-item.active { background: var(--accent); color: white; border-color: var(--accent); }
        .nav-item.answered { border-color: var(--accent); border-width: 2px; }

        /* Main Content */
        .main-container { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; background: var(--bg); position: relative; }
        .top-bar { padding: 15px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 10; }
        .quiz-content { max-width: 700px; margin: 40px auto; padding: 0 20px; width: 100%; }

        /* Typography & Forms */
        h2 { font-weight: 700; font-size: 2rem; margin-bottom: 30px; letter-spacing: -1px; }
        textarea { width: 100%; height: 400px; border: 1px solid var(--border); padding: 20px; font-size: 1rem; line-height: 1.6; resize: none; margin-bottom: 20px; box-sizing: border-box; }
        textarea:focus { outline: none; border-color: var(--accent); }
        
        .btn { background: var(--accent); color: white; border: none; padding: 12px 25px; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; transition: 0.3s; }
        .btn:hover { opacity: 0.8; }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--text); margin-left: 10px; }

        /* Quiz UI */
        .mode-selector { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .mode-option { cursor: pointer; opacity: 0.4; font-weight: 600; font-size: 0.9rem; }
        .mode-option.active { opacity: 1; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }

        .question-card { margin-bottom: 60px; scroll-margin-top: 100px; }
        .q-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 25px; line-height: 1.4; }
        .option { padding: 15px 20px; border: 1px solid var(--border); margin-bottom: 12px; cursor: pointer; transition: all 0.2s; border-radius: 2px; }
        .option:hover { border-color: var(--accent); }
        .option.selected { background: #f0f0f0; border-color: var(--accent); }
        
        /* Feedback Colors */
        .option.correct { color: white; background: var(--correct) !important; border-color: var(--correct) !important; }
        .option.wrong { color: white; background: var(--wrong) !important; border-color: var(--wrong) !important; }

        #scoreOverlay { display: none; text-align: center; padding: 50px; background: white; border: 1px solid var(--border); margin-top: 40px; }
        .score-val { font-size: 4rem; font-weight: 800; display: block; margin: 20px 0; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar" style="display:none;">
    <div class="sidebar-header">QUESTIONS</div>
    <div class="question-nav" id="questionNav"></div>
    <div style="padding: 20px; border-top: 1px solid var(--border);">
        <button class="btn" style="width: 100%;" id="submitAllBtn" onclick="submitQuiz()">Nộp bài</button>
    </div>
</div>

<div class="main-container">
    <div class="top-bar" id="topBar" style="display:none;">
        <div id="quizTimer">00:00</div>
        <div id="quizModeIndicator" style="font-weight:600; text-transform: uppercase; font-size: 0.8rem;"></div>
    </div>

    <div class="quiz-content" id="inputSection">
        <h2>Create Quiz.</h2>
        <div class="mode-selector">
            <div class="mode-option active" onclick="setMode('practice', this)">PRACTICE</div>
            <div class="mode-option" onclick="setMode('test', this)">TEST</div>
        </div>
        <textarea id="rawText" placeholder="Paste your structured text here..."></textarea>
        <button class="btn" onclick="generateQuiz()">Generate</button>
    </div>

    <div class="quiz-content" id="quizArea" style="display:none;">
        <div id="questionsContainer"></div>
        <div id="scoreOverlay">
            <h3>Kết quả bài kiểm tra</h3>
            <span class="score-val" id="finalScore">0/10</span>
            <p id="scoreDetail"></p>
            <button class="btn" onclick="location.reload()">Làm đề khác</button>
        </div>
    </div>
</div>

<script>
    let questions = [];
    let currentMode = 'practice';
    let userAnswers = {};
    let startTime;
    let timerInterval;

    function setMode(mode, el) {
        currentMode = mode;
        document.querySelectorAll('.mode-option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
    }

    async function generateQuiz() {
        const text = document.getElementById('rawText').value;
        if(!text.trim()) return;

        const res = await fetch('/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text})
        });
        questions = await res.json();

        // Ẩn/Hiện giao diện
        document.getElementById('inputSection').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('topBar').style.display = 'flex';
        document.getElementById('quizArea').style.display = 'block';
        document.getElementById('quizModeIndicator').innerText = `Mode: ${currentMode}`;
        
        if(currentMode === 'practice') document.getElementById('submitAllBtn').style.display = 'none';

        renderQuiz();
        renderSidebar();
        startTimer();
    }

    function renderSidebar() {
        const nav = document.getElementById('questionNav');
        nav.innerHTML = '';
        questions.forEach((_, i) => {
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.id = `nav-${i}`;
            item.innerText = i + 1;
            item.onclick = () => document.getElementById(`q-${i}`).scrollIntoView({behavior: 'smooth'});
            nav.appendChild(item);
        });
    }

    function renderQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        questions.forEach((q, i) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-card';
            qDiv.id = `q-${i}`;
            qDiv.innerHTML = `<div class="q-text">${i + 1}. ${q.question}</div>`;
            
            q.options.forEach(opt => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerText = `${opt.label}. ${opt.text}`;
                optDiv.onclick = () => handleSelect(i, opt.label, optDiv, qDiv);
                qDiv.appendChild(optDiv);
            });
            container.appendChild(qDiv);
        });
    }

    function handleSelect(qIdx, label, optDiv, qCard) {
        if (currentMode === 'practice' && qCard.classList.contains('answered')) return;
        if (currentMode === 'test' && document.getElementById('scoreOverlay').style.display === 'block') return;

        // Lưu câu trả lời
        userAnswers[qIdx] = label;
        document.getElementById(`nav-${qIdx}`).classList.add('answered');

        if (currentMode === 'practice') {
            qCard.classList.add('answered');
            const correctLabel = questions[qIdx].answer;
            if (label === correctLabel) {
                optDiv.classList.add('correct');
            } else {
                optDiv.classList.add('wrong');
                // Show correct one
                qCard.querySelectorAll('.option').forEach(o => {
                    if(o.innerText.startsWith(correctLabel)) o.classList.add('correct');
                });
            }
        } else {
            // Test Mode: Chỉ highlight lựa chọn
            qCard.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            optDiv.classList.add('selected');
        }
    }

    function submitQuiz() {
        clearInterval(timerInterval);
        let correctCount = 0;
        questions.forEach((q, i) => {
            const qCard = document.getElementById(`q-${i}`);
            const correctLabel = q.answer;
            const userLabel = userAnswers[i];

            if(userLabel === correctLabel) correctCount++;

            // Highlight kết quả
            qCard.querySelectorAll('.option').forEach(o => {
                if(o.innerText.startsWith(correctLabel)) o.classList.add('correct');
                if(userLabel && userLabel !== correctLabel && o.innerText.startsWith(userLabel)) o.classList.add('wrong');
            });
        });

        const scoreOn10 = ((correctCount / questions.length) * 10).toFixed(2);
        document.getElementById('questionsContainer').style.display = 'none';
        document.getElementById('scoreOverlay').style.display = 'block';
        document.getElementById('finalScore').innerText = `${scoreOn10}/10`;
        document.getElementById('scoreDetail').innerText = `Bạn đúng ${correctCount} trên tổng số ${questions.length} câu hỏi.`;
    }

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const m = Math.floor(elapsed / 60000).toString().padStart(2, '0');
            const s = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('quizTimer').innerText = `${m}:${s}`;
        }, 1000);
    }
</script>
</body>
</html>
